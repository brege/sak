<svg fill="none" viewBox="0 0 850 447" width="850" height="447" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				:root {
					--ink: #222;
					--border: #444;
					--green-s: #2b8a57;
					--green-f: rgba(70,170,110,0.15);
					--green-cap: #2b8a57;
					--blue-s: #3355aa;
					--blue-f: rgba(100,140,220,0.15);
					--blue-cap: #3355aa;
					--purple-s: #7755bb;
					--purple-f: rgba(150,100,220,0.15);
					--purple-cap: #7755bb;
					--yellow-s: #9a7d0a;
					--yellow-f: rgba(200,170,0,0.15);
					--yellow-cap: #9a7d0a;
				}

				@media (prefers-color-scheme: dark) {
					:root {
						--ink: #cdd9e5;
						--border: #8b949e;
						--green-s: #6fd19a;
						--green-f: rgba(95,190,135,0.14);
						--green-cap: #6fd19a;
						--blue-s: #6688dd;
						--blue-f: rgba(100,140,220,0.18);
						--blue-cap: #6688dd;
						--purple-s: #aa88ee;
						--purple-f: rgba(170,130,240,0.18);
						--purple-cap: #aa88ee;
						--yellow-s: #d4b83a;
						--yellow-f: rgba(220,190,60,0.18);
						--yellow-cap: #d4b83a;
					}
				}

				.container {
					font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
					color: var(--ink);
					padding: 12px 24px 4px;
				}

				.flow {
					display: grid;
					grid-template-columns: 260px 36px 200px 36px 260px;
					align-items: center;
				}

				.col { display: flex; flex-direction: column; gap: 8px; }
				.arrow-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 48px; }
				.arrow-col span { font-size: 20px; color: var(--border); line-height: 1; }
				.arrow-col.repo-arrows { align-self: stretch; justify-content: flex-start; gap: 0; padding-top: 72px; }
				.arrow-col.repo-arrows span + span { margin-top: 172px; }
				.arrow-col.machine-arrows { align-self: stretch; justify-content: flex-start; gap: 0; padding-top: 98px; }
				.arrow-col.machine-arrows span + span { margin-top: 147px; }

				.panel { border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; border: 2px solid; }
				.cap { font-size: 13px; font-weight: 700; margin-bottom: 2px; }

				.green { background: var(--green-f); border-color: var(--green-s); }
				.green .cap { color: var(--green-cap); }
				.blue { background: var(--blue-f); border-color: var(--blue-s); }
				.blue .cap { color: var(--blue-cap); }
				.purple { background: var(--purple-f); border-color: var(--purple-s); }
				.purple .cap { color: var(--purple-cap); }
				.yellow { background: var(--yellow-f); border-color: var(--yellow-s); }
				.yellow .cap { color: var(--yellow-cap); }

				.mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.5; white-space: pre; }

				.sub { border-radius: 4px; padding: 7px 0; text-align: center; font-size: 13px; background: var(--blue-f); border: 1.5px solid var(--blue-s); }
				.sub.pop { border-width: 3px; font-weight: 800; text-decoration: underline; }

				.repo-box { border-radius: 4px; padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
				.repo-box.purple { background: var(--purple-f); border: 1.5px solid var(--purple-s); }
				.repo-box.yellow { background: var(--yellow-f); border: 1.5px solid var(--yellow-s); }
			</style>

			<div class="container">
				<div class="flow">
					<div class="panel green">
						<div class="cap">laptop</div>
						<div class="mono">-r sftp:user@unraid</div>
						<div class="repo-box purple">
							<div class="mono" style="font-weight:600;">~/Backups/Unraid/</div>
							<div class="mono">├── config</div>
							<div class="mono">├── data</div>
							<div class="mono">├── index</div>
							<div class="mono">├── keys</div>
							<div class="mono">├── locks</div>
							<div class="mono">└── snapshots</div>
						</div>
						<div class="mono">-r sftp:user@minipc</div>
						<div class="repo-box yellow">
							<div class="mono" style="font-weight:600;">~/Backups/MiniPC/</div>
							<div class="mono">├── config</div>
							<div class="mono">├── data</div>
							<div class="mono">├── index</div>
							<div class="mono">├── keys</div>
							<div class="mono">├── locks</div>
							<div class="mono">└── snapshots</div>
						</div>
					</div>

					<div class="arrow-col repo-arrows"><span>←</span><span>←</span></div>

					<div class="panel blue">
						<div class="cap">rustic + sak mods</div>
						<div class="sub">chunking</div>
						<div class="sub">hashing + dedup</div>
						<div class="sub">encryption</div>
						<div class="sub">snapshot</div>
						<div class="sub pop">toml config</div>
						<div class="sub pop">sequencing</div>
						<div class="sub pop">telemetry</div>
					</div>

					<div class="arrow-col machine-arrows"><span>←</span><span>←</span></div>

					<div class="col">
						<div class="panel purple">
							<div class="cap">Unraid</div>
							<div class="mono">.config/</div>
							<div class="mono">db.sqlite3</div>
							<div class="mono">/etc/nginx/</div>
							<div class="mono">LinuxISOs/</div>
						</div>
						<div class="panel yellow">
							<div class="cap">MiniPC</div>
							<div class="mono">/mnt/user/appdata/</div>
							<div class="mono">/var/lib/plexmediaserver/</div>
							<div class="mono">/boot/config/</div>
							<div class="mono">/docker/</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>
