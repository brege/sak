<svg fill="none" viewBox="0 0 850 470" width="850" height="470" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				:root {
					--ink: #222;
					--border: #444;
					--green-s: #2b8a57;
					--green-f: rgba(70,170,110,0.15);
					--green-cap: #2b8a57;
					--blue-s: #3355aa;
					--blue-f: rgba(100,140,220,0.15);
					--blue-cap: #3355aa;
					--red-s: #aa3333;
					--red-f: rgba(220,100,100,0.15);
					--red-cap: #aa3333;
				}

				@media (prefers-color-scheme: dark) {
					:root {
						--ink: #cdd9e5;
						--border: #8b949e;
						--green-s: #6fd19a;
						--green-f: rgba(95,190,135,0.14);
						--green-cap: #6fd19a;
						--blue-s: #6688dd;
						--blue-f: rgba(100,140,220,0.18);
						--blue-cap: #6688dd;
						--red-s: #dd6666;
						--red-f: rgba(220,100,100,0.18);
						--red-cap: #dd6666;
					}
				}

				.container {
					font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
					color: var(--ink);
					padding: 12px 24px 4px;
				}

				.flow {
					display: grid;
					grid-template-columns: 260px 36px 200px 36px 260px;
					align-items: center;
				}

				.arrow-col { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 48px; }
				.arrow-col span { font-size: 20px; color: var(--border); line-height: 1; }

				.panel { border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; border: 2px solid; }
				.cap { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
				.subcap { font-size: 15px; font-weight: 700; margin-top: 4px; padding-top: 6px; border-top: 1px solid var(--blue-s); }

				.green { background: var(--green-f); border-color: var(--green-s); }
				.green .cap { color: var(--green-cap); }
				.blue { background: var(--blue-f); border-color: var(--blue-s); }
				.blue .cap, .blue .subcap { color: var(--blue-cap); }
				.red { background: var(--red-f); border-color: var(--red-s); }
				.red .cap { color: var(--red-cap); }

				.mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 14px; line-height: 1.5; white-space: pre; }
				.sm { font-size: 12px; }

				.sub { border-radius: 4px; padding: 8px 0; text-align: center; font-size: 15px; background: var(--blue-f); border: 1.5px solid var(--blue-s); }
				.sub.pop { border-width: 3px; font-weight: 800; text-decoration: underline; }

				.repo-box { border-radius: 4px; padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
				.repo-box.green { background: var(--green-f); border: 1.5px solid var(--green-s); }
			</style>

			<div class="container">
				<div class="flow">
					<div class="panel green">
						<div class="cap">laptop</div>
						<div class="mono">~/Documents</div>
						<div class="mono">~/Pictures</div>
						<div class="mono">~/.config</div>
						<div class="mono">~/.mozilla</div>
					</div>

					<div class="arrow-col"><span>→</span></div>

					<div class="panel blue">
						<div class="cap">restic engine</div>
						<div class="sub">chunking</div>
						<div class="sub">hashing + dedup</div>
						<div class="sub">encryption</div>
						<div class="sub">snapshot</div>
						<div class="subcap">rustic adds</div>
						<div class="sub pop">toml config</div>
						<div class="sub pop">sequencing</div>
						<div class="sub pop">telemetry</div>
					</div>

					<div class="arrow-col"><span>→</span></div>

					<div class="panel red">
						<div class="cap">backend</div>
						<div class="mono">-r sftp:user@host</div>
						<div class="mono sm">$RESTIC_REPOSITORY</div>
						<div class="mono sm">$RESTIC_PASSWORD</div>
						<div class="repo-box green">
							<div class="mono" style="font-weight:600;">/backup/Laptop/</div>
							<div class="mono">├── config</div>
							<div class="mono">├── data</div>
							<div class="mono">├── index</div>
							<div class="mono">├── keys</div>
							<div class="mono">├── locks</div>
							<div class="mono">└── snapshots</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</foreignObject>
</svg>
